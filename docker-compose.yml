version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: bytechain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bytechain
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bytechain"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bytechain-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    profiles:
      - optional

volumes:
  postgres_data:
  redis_data:
